<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tableau de bord</title>
  <style>
    body{
      font-family: Arial, sans-serif;
      background:#ffffff;
      margin:0;
      padding:40px 20px;
      color:#132033;
    }
    .box{
      max-width:500px;
      margin:auto;
      padding:30px;
      border-radius:20px;
      background:#f7f8fa;
      border:1px solid #e5e7eb;
    }
    h1{
      margin-bottom:16px;
    }
    p{
      font-size:18px;
      line-height:1.5;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Connexion réussie</h1>
    <p>Bienvenue sur votre espace client.</p>
  </div>
</body>
</html>
