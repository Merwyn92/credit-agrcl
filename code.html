<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Code personnel</title>

<style>

body{
font-family: Arial;
background:white;
padding:40px;
text-align:center;
}

.container{
max-width:400px;
margin:auto;
}

h2{
margin-bottom:20px;
}

.dots{
display:flex;
justify-content:center;
gap:10px;
margin-bottom:30px;
}

.dot{
width:15px;
height:15px;
border-radius:50%;
border:2px solid #2d7d6a;
}

.dot.fill{
background:#2d7d6a;
}

.keypad{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
margin-bottom:25px;
}

.key{
padding:20px;
font-size:22px;
border:none;
border-radius:12px;
background:#f0f0f0;
cursor:pointer;
}

button{
font-size:18px;
}

.login{
background:#2d7d6a;
color:white;
padding:18px;
border-radius:30px;
border:none;
width:100%;
font-size:18px;
cursor:pointer;
}

.message{
margin-top:20px;
color:green;
display:none;
}

</style>

</head>

<body>

<div class="container">

<h2>CODE PERSONNEL</h2>

<div class="dots">
<div class="dot"></div>
<div class="dot"></div>
<div class="dot"></div>
<div class="dot"></div>
<div class="dot"></div>
<div class="dot"></div>
</div>

<div class="keypad">

<button class="key" data-num="1">1</button>
<button class="key" data-num="2">2</button>
<button class="key" data-num="3">3</button>

<button class="key" data-num="4">4</button>
<button class="key" data-num="5">5</button>
<button class="key" data-num="6">6</button>

<button class="key" data-num="7">7</button>
<button class="key" data-num="8">8</button>
<button class="key" data-num="9">9</button>

<button class="key" id="clear">Effacer</button>
<button class="key" data-num="0">0</button>
<button class="key" id="delete">Retour</button>

</div>

<button class="login" id="login">SE CONNECTER</button>

<div class="message" id="message">
Connexion réussie
</div>

</div>

<script>

let pin = ""

const dots = document.querySelectorAll(".dot")
const keys = document.querySelectorAll("[data-num]")
const login = document.getElementById("login")
const message = document.getElementById("message")

function updateDots(){

dots.forEach((dot,index)=>{
dot.classList.toggle("fill",index<pin.length)
})

}

keys.forEach(key=>{

key.addEventListener("click",()=>{

if(pin.length<6){

pin += key.dataset.num
updateDots()

}

})

})

document.getElementById("delete").onclick=()=>{

pin = pin.slice(0,-1)
updateDots()

}

document.getElementById("clear").onclick=()=>{

pin=""
updateDots()

}

login.onclick=()=>{

if(pin.length===6){

message.style.display="block"

setTimeout(()=>{

window.location.href="dashboard.html"

},1000)

}

}

</script>

</body>
</html>
